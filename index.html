<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tablero Financiero LATAM</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ── Reset & Variables ─────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:     #0f172a;
  --card:   #1e293b;
  --border: #334155;
  --text:   #f1f5f9;
  --muted:  #94a3b8;
  --green:  #22c55e;
  --red:    #ef4444;
  --gray:   #64748b;
  --blue:   #6366f1;
  --yellow: #f59e0b;
  --radius: 10px;
  --font:   'Segoe UI', system-ui, sans-serif;
}
html { font-size: 14px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
}
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Utility classes ───────────────────────────────────────────────────── */
.green  { color: var(--green);  }
.red    { color: var(--red);    }
.gray   { color: var(--gray);   }
.muted  { color: var(--muted);  }
.yellow { color: var(--yellow); }
.blue   { color: var(--blue);   }
.bold   { font-weight: 600; }
.small  { font-size: 0.82rem; }
.mono   { font-family: 'Cascadia Code', 'Fira Mono', monospace; }

/* ── Mini-tickers bar ──────────────────────────────────────────────────── */
#ticker-bar {
  background: #0b1220;
  border-bottom: 1px solid var(--border);
  padding: 6px 16px;
  display: flex;
  gap: 24px;
  overflow-x: auto;
  flex-wrap: nowrap;
  white-space: nowrap;
  font-size: 0.8rem;
}
.ticker-item { display: flex; gap: 6px; align-items: center; }
.ticker-label { color: var(--muted); }

/* ── Header ────────────────────────────────────────────────────────────── */
header {
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: baseline;
  gap: 16px;
  flex-wrap: wrap;
}
header h1 { font-size: 1.35rem; font-weight: 700; }
header .updated {
  color: var(--yellow);
  font-size: 0.8rem;
  font-weight: 500;
}

/* ── Tab navigation ────────────────────────────────────────────────────── */
#tab-nav {
  display: flex;
  gap: 4px;
  padding: 10px 20px 0;
  border-bottom: 2px solid var(--border);
  overflow-x: auto;
  flex-wrap: nowrap;
}
.tab-btn {
  background: none;
  border: none;
  border-bottom: 3px solid transparent;
  color: var(--muted);
  cursor: pointer;
  font-size: 0.88rem;
  padding: 8px 14px;
  white-space: nowrap;
  transition: color 0.15s, border-color 0.15s;
  margin-bottom: -2px;
  position: relative;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active {
  color: var(--blue);
  border-bottom-color: var(--blue);
  font-weight: 600;
}
.badge-new {
  position: absolute;
  top: 4px;
  right: 4px;
  background: var(--red);
  color: #fff;
  font-size: 0.6rem;
  font-weight: 700;
  padding: 1px 4px;
  border-radius: 3px;
  line-height: 1.4;
}

/* ── Tab panels ────────────────────────────────────────────────────────── */
.tab-panel { display: none; padding: 20px; }
.tab-panel.active { display: block; }

/* ── Cards & grids ─────────────────────────────────────────────────────── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
}
.card-grid-3 {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 14px;
}
.rate-card {
  border-top: 4px solid var(--gray);
  padding: 14px;
}
.rate-card.trend-up   { border-top-color: var(--green); }
.rate-card.trend-down { border-top-color: var(--red);   }
.rate-card .rate-name  { font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; }
.rate-card .rate-value { font-size: 1.9rem; font-weight: 700; line-height: 1; }
.rate-card .rate-change{ font-size: 0.8rem; margin-top: 4px; }
.rate-est { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }

/* ── Tables ────────────────────────────────────────────────────────────── */
.tbl-wrap { overflow-x: auto; }
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.88rem;
}
th {
  text-align: left;
  color: var(--muted);
  font-weight: 500;
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
td {
  padding: 8px 10px;
  border-bottom: 1px solid #1e293b55;
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.03); }
th.right, td.right { text-align: right; }

/* ── Charts ────────────────────────────────────────────────────────────── */
.chart-wrap {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  position: relative;
}
.chart-wrap canvas { max-width: 100%; }
.chart-title {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--muted);
  margin-bottom: 12px;
}
.charts-2col {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
}

/* ── Section title ─────────────────────────────────────────────────────── */
.section-title {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text);
  margin: 20px 0 12px;
}
.section-title:first-child { margin-top: 0; }

/* ── KPI cards ─────────────────────────────────────────────────────────── */
.kpi-card {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 16px;
}
.kpi-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
.kpi-value { font-size: 2rem; font-weight: 700; line-height: 1; }
.kpi-unit  { font-size: 0.75rem; color: var(--muted); }

/* ── Crypto cards ──────────────────────────────────────────────────────── */
.btc-card {
  background: linear-gradient(135deg, #1e293b 60%, #2d2060);
  border: 1px solid #4c3f9a;
  border-radius: var(--radius);
  padding: 20px 24px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 16px;
}
.btc-card .btc-name { font-size: 0.85rem; color: var(--muted); }
.btc-card .btc-price { font-size: 2.4rem; font-weight: 800; }
.btc-card .btc-changes { display: flex; gap: 20px; font-size: 0.85rem; }
.coin-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
}
.coin-card .coin-sym  { font-size: 0.78rem; color: var(--muted); }
.coin-card .coin-name { font-size: 0.88rem; font-weight: 600; margin-bottom: 4px; }
.coin-card .coin-price{ font-size: 1.2rem; font-weight: 700; }
.coin-card .coin-chg  { font-size: 0.8rem; margin-top: 2px; }

/* ── Rating cards ──────────────────────────────────────────────────────── */
.rating-card {
  text-align: center;
  padding: 20px;
}
.rating-agency { font-size: 0.8rem; color: var(--muted); margin-bottom: 8px; }
.rating-value  { font-size: 1.8rem; font-weight: 800; color: var(--green); }

/* ── Commodity cards ───────────────────────────────────────────────────── */
.comm-card { padding: 14px; }
.comm-name { font-size: 0.78rem; color: var(--muted); margin-bottom: 2px; }
.comm-unit { font-size: 0.7rem; color: var(--gray); }
.comm-price{ font-size: 1.4rem; font-weight: 700; margin: 4px 0; }
.comm-chgs { display: flex; gap: 12px; font-size: 0.8rem; }

/* ── Context note ──────────────────────────────────────────────────────── */
.context-note {
  background: rgba(99,102,241,0.08);
  border-left: 3px solid var(--blue);
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 10px 14px;
  font-size: 0.82rem;
  color: var(--muted);
  margin-top: 16px;
}

/* ── Footer ────────────────────────────────────────────────────────────── */
footer {
  margin-top: 32px;
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  font-size: 0.78rem;
  color: var(--muted);
}
footer .sources { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 8px; }
footer .disclaimer { font-style: italic; }

/* ── Responsive ────────────────────────────────────────────────────────── */
@media (max-width: 600px) {
  header h1 { font-size: 1.1rem; }
  .tab-btn  { font-size: 0.78rem; padding: 6px 10px; }
  .kpi-value, .btc-card .btc-price { font-size: 1.6rem; }
}
</style>
</head>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// UTILITY FUNCTIONS
// ═══════════════════════════════════════════════════════════════════════════

const fmtNum = (v, dec = 2) =>
  (v === null || v === undefined) ? null : Number(v).toFixed(dec);

const fmtPrice = (v, dec = 2) =>
  (v === null || v === undefined)
    ? '<span class="muted">N/A</span>'
    : Number(v).toLocaleString('en-US', { minimumFractionDigits: dec, maximumFractionDigits: dec });

function colorVal(v, suffix = '%', dec = 2) {
  if (v === null || v === undefined) return '<span class="muted">N/A</span>';
  const cls   = v > 0 ? 'green' : v < 0 ? 'red' : 'gray';
  const arrow = v > 0 ? '↑' : v < 0 ? '↓' : '→';
  return `<span class="${cls}">${arrow} ${Math.abs(v).toFixed(dec)}${suffix}</span>`;
}

const estTag = (flag) =>
  flag ? ' <span class="muted small">(est.)</span>' : '';

const CHART_DEFAULTS = {
  responsive: true,
  maintainAspectRatio: true,
  plugins: {
    legend: { labels: { color: '#94a3b8', font: { size: 11 } } },
    tooltip: {
      backgroundColor: '#1e293b',
      borderColor: '#334155',
      borderWidth: 1,
      titleColor: '#f1f5f9',
      bodyColor: '#94a3b8',
    },
  },
  scales: {
    x: { ticks: { color: '#94a3b8', font: { size: 11 } }, grid: { color: '#334155' } },
    y: { ticks: { color: '#94a3b8', font: { size: 11 } }, grid: { color: '#334155' } },
  },
};

const chartInstances = {};

function destroyChart(id) {
  if (chartInstances[id]) {
    chartInstances[id].destroy();
    delete chartInstances[id];
  }
}

function makeChart(id, config) {
  destroyChart(id);
  const ctx = document.getElementById(id);
  if (!ctx) return;
  chartInstances[id] = new Chart(ctx, config);
}

const COLORS_POS_NEG = (vals) =>
  vals.map(v => (v >= 0 ? '#22c55e99' : '#ef444499'));

// ═══════════════════════════════════════════════════════════════════════════
// MINI-TICKER BAR
// ═══════════════════════════════════════════════════════════════════════════

function renderTickerBar() {
  const items = [];

  // BCRP rate
  const bcrp = D.rates?.bcrp;
  if (bcrp) items.push({ label: 'BCRP', value: `${bcrp.value}%`, change: null });

  // USD/PEN
  const pen = D.fx?.find(f => f.pair === 'USD/PEN');
  if (pen?.price) items.push({ label: 'USD/PEN', value: fmtNum(pen.price, 4), change: pen.day_pct });

  // Gold
  const gold = D.commodities?.gold;
  if (gold?.price) items.push({ label: 'Oro', value: `$${fmtNum(gold.price, 0)}`, change: gold.day_pct });

  // BTC
  const btc = D.crypto?.coins?.find(c => c.id === 'bitcoin');
  if (btc?.price) items.push({ label: 'BTC', value: `$${Number(btc.price).toLocaleString('en-US', {maximumFractionDigits:0})}`, change: btc.change_24h });

  // WTI
  const wti = D.commodities?.wti;
  if (wti?.price) items.push({ label: 'WTI', value: `$${fmtNum(wti.price, 2)}`, change: wti.day_pct });

  // S&P 500
  const sp = D.indices?.find(i => i.ticker === '^GSPC');
  if (sp?.price) items.push({ label: 'S&P 500', value: fmtNum(sp.price, 0), change: sp.day_pct });

  const bar = document.getElementById('ticker-bar');
  bar.innerHTML = items.map(item => {
    const chg = item.change !== null && item.change !== undefined
      ? `<span class="${item.change >= 0 ? 'green' : 'red'}">${item.change >= 0 ? '▲' : '▼'} ${Math.abs(item.change).toFixed(2)}%</span>`
      : '';
    return `<div class="ticker-item"><span class="ticker-label">${item.label}</span><span class="bold">${item.value}</span>${chg}</div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════════════════════
// TAB 1 — TASAS
// ═══════════════════════════════════════════════════════════════════════════

function renderTasas() {
  const panel = document.getElementById('panel-tasas');
  const rates = D.rates || {};
  const rateArr = Object.values(rates);

  // Cards
  const cards = rateArr.map(r => {
    const trendClass = r.trend === 'up' ? 'trend-up' : r.trend === 'down' ? 'trend-down' : '';
    const chgHtml = r.change_pbs !== 0
      ? colorVal(r.change_pbs, ' pbs', 0)
      : '<span class="gray">→ Sin cambio</span>';
    return `
      <div class="card rate-card ${trendClass}">
        <div class="rate-name">${r.name}</div>
        <div class="rate-value">${r.value}%</div>
        <div class="rate-change">${chgHtml}</div>
        ${r.est ? '<div class="rate-est">*estimado</div>' : ''}
      </div>`;
  }).join('');

  panel.innerHTML = `

}

  const ytdVals = coins.map(c => c.ytd_pct ?? null);

// ═══════════════════════════════════════════════════════════════════════════
// TAB SYSTEM
// ═══════════════════════════════════════════════════════════════════════════

const tabRenderers = {
  tasas:   { fn: renderTasas,   rendered: false },
  bonos:   { fn: renderBonos,   rendered: false },
  divisas: { fn: renderDivisas, rendered: false },
  activos: { fn: renderActivos, rendered: false },
  etfs:    { fn: renderEtfs,    rendered: false },
  crypto:  { fn: renderCrypto,  rendered: false },
  macro:   { fn: renderMacro,   rendered: false },
};

function switchTab(tabId) {
  // Update buttons
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tabId);
  });
  // Update panels
  document.querySelectorAll('.tab-panel').forEach(panel => {
    panel.classList.toggle('active', panel.id === `panel-${tabId}`);
  });
  // Lazy render
  const tr = tabRenderers[tabId];
  if (tr && !tr.rendered) {
    tr.fn();
    tr.rendered = true;
  }
}

// ═══════════════════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════════════════

document.addEventListener('DOMContentLoaded', () => {
  // Header date
  const updatedEl = document.getElementById('updated-at');
  const footerEl  = document.getElementById('footer-updated');
  const ts = D.updated_at || '';
  if (updatedEl) updatedEl.textContent = `Actualizado: ${ts}`;
  if (footerEl)  footerEl.textContent  = `Última actualización: ${ts}`;

  // Ticker bar
  renderTickerBar();

  // Tab buttons
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });

  // Render first tab immediately
  renderTasas();
  tabRenderers.tasas.rendered = true;
});
